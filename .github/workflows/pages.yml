name: Deploy to GitHub Pages
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci || npm install
      - run: npm run build
      # Huella del commit DENTRO del artefacto publicado. El gate final se la
      # pide al dominio: si no la devuelve, el deploy no llego a produccion.
      # Sin punto inicial a proposito (los dotfiles pueden no servirse).
      - name: Sellar build-id
        run: echo "${{ github.sha }}" > dist/build-id.txt
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

      # ─── GATE REAL: verifica el DOMINIO, no el build ───
      # Un deploy verde solo prueba que el artefacto se subio. NO prueba que el
      # visitante lo vea: el DNS puede apuntar a otro origen (p.ej. un GitHub
      # Pages congelado detras del proxy de Cloudflare). Cuatro sitios del
      # portafolio estuvieron asi entre 3 semanas y 5 meses, en verde.
      - name: Verificar que el dominio sirve este commit
        run: |
          DOMINIO="seguridadprivadamx.com"
          for i in $(seq 1 12); do
            sleep 10
            # cache-bust obligatorio: sin el, el edge devuelve el valor viejo y da falso verde
            LIVE=$(curl -fsSL --max-time 15 "https://$DOMINIO/build-id.txt?cb=${RANDOM}${i}" 2>/dev/null | tr -d '[:space:]' || echo "")
            if [ "$LIVE" = "${{ github.sha }}" ]; then
              echo "OK — $DOMINIO sirve ${GITHUB_SHA:0:12}"
              exit 0
            fi
            echo "intento $i/12 — el dominio devuelve '${LIVE:0:12}', esperado '${GITHUB_SHA:0:12}'"
          done
          echo "::error::$DOMINIO NO sirve este build tras 2 min. El deploy fue verde, pero el dominio apunta a otro origen (revisar: custom domain del proyecto Pages, DNS de la zona, y GitHub Pages activo en el repo)."
          exit 1
