                        "acceptedAnswer": {
                                "@type": "Answer",
                                "text": "Es el conjunto de personal, tecnología y protocolos que regula quién entra y sale de un condominio. Incluye la caseta y el guardia, los dispositivos de identificación (tags, tarjetas, biometría, códigos), las barreras físicas (plumas, torniquetes, cerraduras electrónicas) y los procedimientos para residentes, visitantes y proveedores. Su objetivo es que solo accedan personas autorizadas, dejando registro de cada movimiento."
                        }
                },
                {
                        "@type": "Question",
                        "name": "¿Qué tecnología de identificación es la mejor?",
                        "acceptedAnswer": {
                                "@type": "Answer",
                                "text": "No hay una única mejor; depende del condominio. Los tags y tarjetas RFID son económicos y prácticos para residentes; la biometría (huella o rostro) ofrece la mayor seguridad porque no se presta ni se pierde; los códigos QR temporales son ideales para visitantes. Lo recomendable suele ser combinar: credencial o tag para residentes y QR o registro digital para visitas, siempre con el respaldo del guardia para las excepciones."
                        }
                },
                {
                        "@type": "Question",
                        "name": "¿Cómo se debe controlar el acceso de visitantes?",
                        "acceptedAnswer": {
                                "@type": "Answer",
                                "text": "El visitante se identifica, el guardia verifica la autorización con el residente, se registra el ingreso (idealmente en bitácora digital con foto de identificación) y se da acceso controlado. Los sistemas modernos permiten que el residente preautorice la visita generando un código QR temporal, lo que agiliza la entrada sin perder control ni registro. La cámara del acceso respalda todo el proceso."
                        }
                },
                {
                        "@type": "Question",
                        "name": "¿Pluma vehicular automática o caseta con guardia?",
                        "acceptedAnswer": {
                                "@type": "Answer",
                                "text": "No es uno u otro: lo ideal es combinarlos. La pluma o barrera automática agiliza el paso de residentes con tag y evita que cualquiera entre detrás de otro auto, mientras el guardia supervisa, atiende visitantes y maneja las excepciones. La automatización ordena el flujo; el guardia aporta criterio y respuesta ante imprevistos. Juntos dan rapidez y control."
                        }
                },
                {
                        "@type": "Question",
                        "name": "¿Cuánto cuesta un sistema de control de acceso?",
                        "acceptedAnswer": {
                                "@type": "Answer",
                                "text": "Depende del alcance. Como referencia 2026: una pluma o barrera vehicular automatizada ronda entre 25,000 y 90,000 pesos por acceso; un control peatonal con torniquete o cerradura electrónica va de 15,000 a 60,000; y el software de gestión de visitantes suele cobrarse mensual o venir incluido con el servicio de guardias. Es una inversión que ordena el flujo y reduce vulnerabilidades de forma permanente."
                        }
                },
                {
                        "@type": "Question",

                                "@type": "Answer",

                        }
