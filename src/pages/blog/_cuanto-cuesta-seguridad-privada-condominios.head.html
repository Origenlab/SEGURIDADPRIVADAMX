                                "@type": "Answer",

                                "@type": "Answer",
                                "text": "Para cubrir un solo puesto las 24 horas, los 7 días de la semana, se requieren mínimo 4 a 5 guardias: tres turnos de 8 horas (o dos de 12) más el personal que cubre descansos semanales, vacaciones e incapacidades conforme a la ley. Por eso un puesto 24/7 no equivale al sueldo de una persona, sino al de un equipo completo. Es el dato que más sorprende a las mesas directivas cuando se los explicamos."
                        }
                },
                {
                        "@type": "Question",

                        "acceptedAnswer": {
                                "@type": "Answer",
