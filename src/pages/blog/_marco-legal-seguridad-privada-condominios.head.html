                                "@type": "Answer",
                                "text": "Para prestar servicios dentro de la Ciudad de México, la empresa debe contar con la autorización o permiso vigente de la Secretaría de Seguridad Ciudadana (SSC-CDMX), a través de su Dirección General de Seguridad Privada. Si además opera en dos o más entidades federativas, requiere autorización federal de la Secretaría de Seguridad y Protección Ciudadana (SSPC) mediante la Dirección General de Seguridad Privada (DGSP). Y por poner personal a disposición del contratante, debe estar inscrita y vigente en el REPSE de la STPS."

                {
                        "@type": "Question",
                        "name": "¿Qué es el REPSE y por qué importa para mi condominio?",
                        "acceptedAnswer": {
                                "@type": "Answer",
                                "text": "El REPSE es el Registro de Prestadoras de Servicios Especializados u Obras Especializadas, un padrón público de la Secretaría del Trabajo y Previsión Social (STPS). Tras la reforma de subcontratación, toda empresa que pone trabajadores propios a disposición de un cliente —como una empresa de guardias— debe estar registrada y vigente. Contratar a un proveedor sin REPSE activo puede generar responsabilidad y sanciones para ambas partes."
                        }
                },
                {
                        "@type": "Question",
                        "name": "¿Cuál es la diferencia entre el permiso federal (DGSP) y el local (SSC-CDMX)?",
                        "acceptedAnswer": {
                                "@type": "Answer",
                                "text": "El permiso local de la SSC-CDMX habilita a la empresa para operar dentro de la Ciudad de México. La autorización federal de la DGSP, dependiente de la SSPC, es necesaria cuando la empresa presta servicios en dos o más entidades federativas. Una empresa que solo opera en CDMX necesita el permiso local; una que cubre varios estados necesita ambos. Lo importante es que el permiso ampare el lugar donde está tu condominio."
                        }
                },
                {
                        "@type": "Question",
                        "name": "¿Es legal contratar vigilantes por mi cuenta para ahorrar?",
                        "acceptedAnswer": {
                                "@type": "Answer",
                                "text": "Contratar vigilantes de forma directa, sin una empresa autorizada, expone al condominio a riesgos serios: responsabilidad laboral (IMSS, finiquitos, demandas), ausencia de las certificaciones obligatorias y falta de respaldo ante incidentes. Si una persona contratada directamente comete una falta o sufre un accidente, el condominio o sus representantes podrían resultar responsables. La vía segura es contratar una empresa con permisos vigentes."
                        }
                },
                {
                        "@type": "Question",
                        "name": "¿Qué seguros debe tener la empresa de seguridad?",
                        "acceptedAnswer": {
                                "@type": "Answer",
                                "text": "La normatividad de la CDMX exige que las empresas cuenten con una póliza vigente de fianza de fidelidad patrimonial, que cubre la responsabilidad económica derivada de la eventual comisión de delitos por parte del personal, y una póliza de seguro de responsabilidad civil, que cubre daños a terceros. Pide copia de ambas pólizas vigentes antes de firmar; una empresa seria te las muestra sin problema."
                        }
                },

                        "@type": "Question",

                        }
