                {
                        "@type": "Question",
                        "name": "¿Qué emergencias debe contemplar un condominio?",

                                "@type": "Answer",
                                "text": "Como mínimo: intrusión o robo, incendio, sismo (especialmente relevante en CDMX), emergencias médicas, fugas de gas o agua, y fallas eléctricas. Un plan completo también considera personas extraviadas, conflictos entre residentes y desastres naturales. Cada tipo de emergencia debe tener su propio protocolo, porque la respuesta correcta ante un incendio es muy distinta a la de un sismo o un robo."
                        }
                },

                        "@type": "Question",

                        "acceptedAnswer": {
                                "@type": "Answer",
                                "text": "Debe existir una cadena de mando definida. Normalmente, el guardia en turno ejecuta la primera respuesta y da aviso; el supervisor de la empresa de seguridad coordina al personal; y la administración o un comité de emergencias toma las decisiones que involucran a la comunidad, como una evacuación. Tener claro quién decide qué evita confusiones en el momento más crítico."
                        }
                },

                        "@type": "Question",
                        "name": "¿Cada cuánto se deben hacer simulacros?",
                        "acceptedAnswer": {
                                "@type": "Answer",
                                "text": "Lo recomendable es realizar al menos dos simulacros al año, especialmente de sismo y de evacuación por incendio, además de la capacitación continua del personal de seguridad. Los simulacros revelan fallas que en el papel no se ven (rutas bloqueadas, puntos de reunión mal ubicados, falta de coordinación) y entrenan a residentes y guardias para actuar con calma. La práctica es lo que hace que un protocolo funcione de verdad."
                        }
                },
                {
                        "@type": "Question",
                        "name": "¿Qué debe hacer un condominio ante un sismo?",

                                "@type": "Answer",
