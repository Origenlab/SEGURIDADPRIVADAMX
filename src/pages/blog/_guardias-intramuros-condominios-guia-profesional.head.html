                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "En CDMX, un guardia intramuros debe contar con: credencial individual vigente de la SSC-CDMX, capacitación mínima de 40 horas certificadas, evaluación psicológica aprobada, verificación de antecedentes penales limpia, exámenes toxicológicos negativos, y trabajar para una empresa con permisos DGSP y REPSE activos."
                }
            },
            {
                "@type": "Question",
                "name": "¿Cuánto cuesta un servicio de guardias intramuros para un condominio?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "El costo varía según el tamaño del condominio y horarios requeridos. Para un turno 24/7 con un puesto de vigilancia, el rango en CDMX es de $28,000 a $45,000 mensuales. Condominios medianos (2 puestos) pagan entre $55,000 y $75,000. Estos precios incluyen nómina, prestaciones legales, equipamiento y supervisión."
                }
            },
            {
                "@type": "Question",
                "name": "¿Cuántos guardias intramuros necesita mi condominio?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Depende de varios factores: número de accesos (cada acceso requiere al menos 1 puesto), tamaño del perímetro, nivel de riesgo de la zona, y servicios adicionales como rondines. Un condominio típico de 50-100 unidades con un acceso necesita mínimo 4-5 guardias para cubrir turnos 24/7 con descansos. Condominios grandes pueden requerir 8-12 elementos."
                }
            },
            {
                "@type": "Question",
                "name": "¿Cuál es la diferencia entre guardias intramuros y guardias externos?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Los guardias intramuros trabajan exclusivamente dentro del condominio, conocen a los residentes y la operación diaria. Los guardias externos o de patrullaje cubren múltiples propiedades y realizan rondines vehiculares. Para condominios, se recomienda guardias intramuros por su conocimiento específico del lugar y mayor compromiso con la comunidad."
                }
            },

                "@type": "Question",

                    "@type": "Answer",
